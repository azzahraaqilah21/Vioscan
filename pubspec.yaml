name: vioscan_flutter
description: VioScan BC-Care - AI-Assisted UV Fluorescence Screening App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

    # Tambahkan pustaka Firebase & pendukung di bawah ini:
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  google_sign_in: ^6.2.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  cached_network_image: ^3.3.1
  intl: ^0.20.3
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
